<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#faf9f6"/>
  <!-- Hummingbird Logo - Minimalist geometric design -->
  <g fill="#1c1917">
    <!-- Head (semicircle) -->
    <path d="M48 32 A13 13 0 1 1 48 58 L48 32"/>
    <!-- Beak (long pointed line) -->
    <path d="M61 40 L98 36 L61 50 Z"/>
    <!-- Wing/Body (large angular triangle) -->
    <path d="M55 50 L78 80 L25 65 Z"/>
    <!-- Tail (small pointed triangle) -->
    <path d="M25 65 L8 85 L18 58 Z"/>
  </g>
</svg>
